<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vamp – Space Survivors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #00000e;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    #gameCanvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    /* ── Overlays ──────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 18, 0.86);
      z-index: 10;
    }

    .overlay.hidden {
      display: none;
    }

    .hidden {
      display: none !important;
    }

    /* ── Title Screen ──────────────────────────────────────────── */
    #titleOverlay {
      gap: 22px;
    }

    #titleOverlay .title-logo {
      font-size: 3.5rem;
      color: #00e5ff;
      text-shadow: 0 0 40px #00e5ffaa, 0 0 80px #00e5ff44;
      letter-spacing: 10px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 40px #00e5ffaa, 0 0 80px #00e5ff44; }
      50%       { text-shadow: 0 0 60px #00e5ffcc, 0 0 120px #00e5ff66; }
    }

    #titleOverlay .title-sub {
      font-size: 0.55rem;
      color: #4dd0e1;
      letter-spacing: 4px;
      margin-bottom: 14px;
    }

    #titleOverlay .title-hint {
      font-size: 0.44rem;
      color: #80cbc4;
      letter-spacing: 2px;
      line-height: 2;
      text-align: center;
    }

    #titleOverlay #highScoreDisplay {
      font-size: 0.5rem;
      color: #ffd740;
      letter-spacing: 2px;
    }

    #playBtn {
      padding: 14px 44px;
      background: #0d1b4b;
      color: #00e5ff;
      border: 2px solid #00e5ff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 3px;
      transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
      margin-top: 8px;
    }

    #playBtn:hover {
      background: #00e5ff;
      color: #000;
      transform: scale(1.06);
      box-shadow: 0 0 20px #00e5ff88;
    }

    /* ── Difficulty Screen ─────────────────────────────────────── */
    #difficultyOverlay {
      gap: 20px;
    }

    #difficultyOverlay h2 {
      color: #00e5ff;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-shadow: 0 0 16px #00e5ff88;
    }

    #difficultyOverlay p {
      color: #4dd0e1;
      font-size: 0.5rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    #diffBtns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .diff-btn {
      width: 150px;
      padding: 16px 10px;
      background: #020818;
      border: 2px solid #0d47a1;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.1s, transform 0.1s, background 0.1s;
    }

    .diff-btn:not(:disabled):hover {
      border-color: #00e5ff;
      background: #050f2a;
      transform: translateY(-3px);
      box-shadow: 0 0 14px #00e5ff44;
    }

    .diff-btn:disabled {
      border-color: #263238;
      background: #01040d;
      cursor: default;
      opacity: 0.65;
    }

    .diff-btn .diff-name {
      color: #e0f7fa;
      font-size: 0.65rem;
    }

    .diff-btn .diff-desc {
      color: #4dd0e1;
      font-size: 0.42rem;
      text-align: center;
      line-height: 1.7;
    }

    .diff-btn .diff-lock {
      color: #ffd740;
      font-size: 0.36rem;
      text-align: center;
      line-height: 1.7;
    }

    .diff-btn:disabled .diff-name,
    .diff-btn:disabled .diff-lock {
      color: #90a4ae;
    }

    /* ── Level-up UI ───────────────────────────────────────────── */
    #levelUpOverlay h2 {
      color: #00e5ff;
      font-size: 1.4rem;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #00e5ff88;
      letter-spacing: 3px;
    }

    #levelUpOverlay p {
      color: #4fc3f7;
      margin-bottom: 28px;
      font-size: 0.6rem;
      letter-spacing: 2px;
    }

    #upgradeCards {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .upgrade-card {
      width: 190px;
      padding: 18px 14px;
      background: #020818;
      border: 2px solid #0d47a1;
      cursor: pointer;
      transition: border-color 0.1s, transform 0.1s, background 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      image-rendering: pixelated;
    }

    .upgrade-card:hover {
      border-color: #00e5ff;
      background: #050f2a;
      transform: translateY(-3px);
      box-shadow: 0 0 14px #00e5ff44;
    }

    .card-sprite {
      image-rendering: pixelated;
      width: 48px;
      height: 48px;
    }

    .card-label {
      color: #e0f7fa;
      font-size: 0.6rem;
      line-height: 1.5;
    }

    .card-desc {
      color: #4dd0e1;
      font-size: 0.5rem;
      line-height: 1.6;
    }

    /* ── Pause powerup section ─────────────────────────────────── */
    #pausePowerups {
      width: 100%;
      max-width: 760px;
    }

    .pause-powerups-heading {
      color: #4dd0e1;
      font-size: 0.5rem;
      letter-spacing: 3px;
      margin-bottom: 10px;
      text-align: center;
    }

    .pause-powerups-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .pause-powerup-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: #020818;
      border: 1px solid #0d47a1;
      padding: 8px 10px;
      width: 90px;
    }

    .pause-powerup-sprite {
      image-rendering: pixelated;
      width: 32px;
      height: 32px;
    }

    .pause-powerup-name {
      color: #80cbc4;
      font-size: 0.32rem;
      text-align: center;
      letter-spacing: 1px;
    }

    .pause-powerup-stacks {
      color: #ffd740;
      font-size: 0.5rem;
    }

    /* ── Menu (pause) button ───────────────────────────────────── */
    #menuBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 5;
      width: 44px;
      height: 44px;
      background: rgba(2, 8, 32, 0.82);
      border: 2px solid #01579b;
      color: #00e5ff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      touch-action: manipulation;
      transition: background 0.1s, border-color 0.1s;
    }

    #menuBtn:hover, #menuBtn:active {
      background: rgba(0, 229, 255, 0.15);
      border-color: #00e5ff;
    }

    #menuBtn.hidden { display: none; }

    /* ── Mute button ───────────────────────────────────────────── */
    #muteBtn {
      position: fixed;
      top: 10px;
      right: 62px;
      z-index: 5;
      width: 44px;
      height: 44px;
      background: rgba(2, 8, 32, 0.82);
      border: 2px solid #01579b;
      color: #00e5ff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      touch-action: manipulation;
      transition: background 0.1s, border-color 0.1s;
    }

    #muteBtn:hover, #muteBtn:active {
      background: rgba(0, 229, 255, 0.15);
      border-color: #00e5ff;
    }

    /* ── Mobile responsive overlays ───────────────────────────── */
    @media (max-width: 600px) {
      #titleOverlay .title-logo { font-size: 2.2rem; }
      #titleOverlay .title-sub  { font-size: 0.42rem; }
      .diff-btn { width: 120px; padding: 12px 6px; }
      .diff-btn .diff-name { font-size: 0.55rem; }
      .diff-btn .diff-desc { font-size: 0.37rem; }

      #levelUpOverlay h2 { font-size: 0.9rem; }
      #levelUpOverlay p  { font-size: 0.45rem; }
      .upgrade-card      { width: 150px; padding: 12px 10px; }
      .card-label        { font-size: 0.48rem; }
      .card-desc         { font-size: 0.4rem; }

      #pauseOverlay h2   { font-size: 0.85rem; }
      .pause-tab-btn     { font-size: 0.42rem; padding: 8px 14px; }
      #pauseStats        { font-size: 0.45rem; gap: 16px; flex-wrap: wrap; justify-content: center; }
      #pauseStats .stat-val { font-size: 0.7rem; }
      #pauseWeapons      { max-width: 100%; padding: 0 8px; }
      .pause-weapon-card { width: 145px; padding: 10px 12px; }
      .pause-weapon-name { font-size: 0.45rem; }
      .pause-weapon-level { font-size: 0.4rem; }
      .pause-weapon-stats { font-size: 0.38rem; }
      .pause-logbook-grid { grid-template-columns: 1fr; }
      .pause-logbook-name { font-size: 0.42rem; }
      .pause-logbook-desc,
      .pause-logbook-recipe,
      .pause-logbook-status { font-size: 0.34rem; }
      .pause-powerup-item { width: 72px; padding: 6px 8px; }
      .pause-powerup-name { font-size: 0.28rem; }
      #resumeBtn,
      #retireBtn         { font-size: 0.55rem; padding: 10px 24px; }
      #restartBtn        { font-size: 0.55rem; padding: 10px 24px; }
      #gameOverOverlay h1 { font-size: 1.2rem; }
      #gameOverStats     { font-size: 0.5rem; }
    }

    /* Make pause overlay scrollable if content overflows on small screens */
    #pauseOverlay {
      overflow-y: auto;
      justify-content: flex-start;
      padding: 20px 12px;
      gap: 24px;
    }

    #pauseOverlay h2 {
      color: #00e5ff;
      font-size: 1.2rem;
      text-shadow: 0 0 16px #00e5ff88;
      letter-spacing: 4px;
    }

    .pause-tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .pause-tab-btn {
      padding: 10px 18px;
      background: #020818;
      color: #80cbc4;
      border: 2px solid #0d47a1;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }

    .pause-tab-btn.active,
    .pause-tab-btn:hover {
      background: #081635;
      border-color: #00e5ff;
      color: #e0f7fa;
    }

    .pause-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    #pauseStats {
      display: flex;
      gap: 28px;
      font-size: 0.55rem;
      color: #4dd0e1;
      letter-spacing: 2px;
    }

    #pauseStats span {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #pauseStats .stat-val {
      color: #e0f7fa;
      font-size: 0.85rem;
    }

    #pauseWeapons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 760px;
    }

    .pause-weapon-card {
      width: 210px;
      padding: 14px 16px;
      background: #020818;
      border: 2px solid #0d47a1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pause-weapon-card.evolution { border-color: #6200ea; }

    .pause-weapon-name {
      color: #00e5ff;
      font-size: 0.55rem;
      letter-spacing: 1px;
    }

    .pause-weapon-card.evolution .pause-weapon-name { color: #ea80fc; }

    .pause-weapon-level { color: #ffd740; font-size: 0.5rem; }

    .pause-weapon-stats {
      color: #80cbc4;
      font-size: 0.45rem;
      line-height: 1.8;
    }

    #pauseLogbook {
      max-width: 860px;
      padding: 0 8px;
    }

    .pause-logbook-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pause-logbook-heading {
      color: #4dd0e1;
      font-size: 0.58rem;
      letter-spacing: 3px;
      text-align: center;
    }

    .pause-logbook-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .pause-logbook-card {
      background: #020818;
      border: 2px solid #0d47a1;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 154px;
    }

    .pause-logbook-card.current {
      border-color: #00e5ff;
      box-shadow: 0 0 14px #00e5ff22;
    }

    .pause-logbook-card.ready {
      border-color: #ffd740;
    }

    .pause-logbook-card.mystery {
      border-color: #37474f;
    }

    .pause-logbook-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pause-logbook-sprite {
      width: 30px;
      height: 30px;
      image-rendering: pixelated;
      flex: 0 0 auto;
    }

    .pause-logbook-mystery-icon {
      width: 30px;
      height: 30px;
      border: 2px solid #546e7a;
      color: #90a4ae;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      line-height: 1;
      flex: 0 0 auto;
    }

    .pause-logbook-name {
      color: #e0f7fa;
      font-size: 0.48rem;
      line-height: 1.6;
    }

    .pause-logbook-status {
      color: #ffd740;
      font-size: 0.34rem;
      line-height: 1.6;
    }

    .pause-logbook-desc,
    .pause-logbook-recipe {
      color: #80cbc4;
      font-size: 0.4rem;
      line-height: 1.8;
    }

    .pause-logbook-recipe {
      color: #b2ebf2;
    }

    .pause-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    #resumeBtn {
      padding: 12px 36px;
      background: #0d1b4b;
      color: #00e5ff;
      border: 2px solid #00e5ff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.1s, transform 0.1s;
    }

    #resumeBtn:hover {
      background: #00e5ff;
      color: #000;
      transform: scale(1.04);
    }

    #retireBtn {
      padding: 12px 36px;
      background: #2a0b18;
      color: #ff8a80;
      border: 2px solid #ff5252;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.1s, transform 0.1s;
    }

    #retireBtn:hover {
      background: #ff5252;
      color: #000;
      transform: scale(1.04);
    }

    /* ── Game Over UI ──────────────────────────────────────────── */
    #gameOverOverlay {
      gap: 16px;
      overflow-y: auto;
      padding: 20px 12px;
    }

    #gameOverOverlay h1 {
      color: #ff1744;
      font-size: 1.8rem;
      text-shadow: 0 0 30px #ff174488;
      letter-spacing: 4px;
      margin-bottom: 8px;
      line-height: 1.4;
      text-align: center;
    }

    #gameOverStats {
      color: #90caf9;
      font-size: 0.55rem;
      letter-spacing: 1px;
      text-align: center;
      line-height: 2.2;
      max-width: 560px;
    }

    .stats-line { color: #90caf9; }
    .stats-line b { color: #e0f7fa; }

    .stats-weapons {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 420px;
      width: 100%;
    }

    .stats-weapon-row {
      display: flex;
      justify-content: space-between;
      color: #80cbc4;
      font-size: 0.48rem;
      padding: 4px 8px;
      border: 1px solid #0d47a1;
      background: #020818;
    }

    .stats-weapon-row span:last-child { color: #ffd740; }

    #restartBtn {
      padding: 14px 36px;
      background: #0d1b4b;
      color: #00e5ff;
      border: 2px solid #00e5ff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
      margin-top: 8px;
    }

    #restartBtn:hover {
      background: #00e5ff;
      color: #000;
      transform: scale(1.04);
      box-shadow: 0 0 16px #00e5ff88;
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- Pause menu button (visible during gameplay) -->
  <button id="menuBtn" title="Pause (P)" class="hidden">⏸</button>

  <!-- Mute / unmute button -->
  <button id="muteBtn" title="Toggle sound">🔊</button>

  <!-- Title screen -->
  <div id="titleOverlay" class="overlay">
    <div class="title-logo">VAMP</div>
    <div class="title-sub">SPACE SURVIVORS</div>
    <div id="highScoreDisplay" class="title-hint">Best: 0 kills</div>
    <div class="title-hint">
      WASD / Arrow keys to move<br>
      Survive as long as possible
    </div>
    <button id="playBtn">▶ PLAY</button>
  </div>

  <!-- Stage selector -->
  <div id="difficultyOverlay" class="overlay hidden">
    <h2>SELECT STAGE</h2>
    <p id="difficultyHint">Beat the 3rd boss in a run to unlock the next stage.</p>
    <div id="diffBtns"></div>
  </div>

  <!-- Pause overlay -->
  <div id="pauseOverlay" class="overlay hidden">
    <h2 id="pauseTitle">⏸ PAUSED</h2>
    <div class="pause-tabs">
      <button id="pauseRunTab" class="pause-tab-btn active">RUN</button>
      <button id="pauseLogbookTab" class="pause-tab-btn">LOGBOOK</button>
    </div>
    <div id="pauseRunPanel" class="pause-panel">
      <div id="pauseStats"></div>
      <div id="pauseWeapons"></div>
      <div id="pausePowerups"></div>
    </div>
    <div id="pauseLogbook" class="pause-panel hidden"></div>
    <div class="pause-actions">
      <button id="resumeBtn">RESUME</button>
      <button id="retireBtn">RETIRE RUN</button>
    </div>
  </div>

  <!-- Level-up overlay -->
  <div id="levelUpOverlay" class="overlay hidden">
    <h2>★ RANK UP! ★</h2>
    <p>CHOOSE UPGRADE</p>
    <div id="upgradeCards"></div>
  </div>

  <!-- Game over overlay -->
  <div id="gameOverOverlay" class="overlay hidden">
    <h1>HULL BREACH</h1>
    <div id="gameOverStats"></div>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
