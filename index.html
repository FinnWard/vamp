<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vamp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #gameCanvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    /* ── Overlays ──────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      z-index: 10;
      transition: opacity 0.15s;
    }

    .overlay.hidden {
      display: none;
    }

    /* ── Level-up UI ───────────────────────────────────────────── */
    #levelUpOverlay h2 {
      color: #69f0ae;
      font-size: 2rem;
      margin-bottom: 8px;
      text-shadow: 0 0 20px #69f0ae88;
      letter-spacing: 2px;
    }

    #levelUpOverlay p {
      color: #aaa;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    #upgradeCards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .upgrade-card {
      width: 180px;
      padding: 20px 16px;
      background: #0d1a0d;
      border: 2px solid #2e7d32;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: center;
    }

    .upgrade-card:hover {
      border-color: #69f0ae;
      background: #1a2e1a;
      transform: translateY(-4px);
    }

    .card-label {
      color: #fff;
      font-size: 0.95rem;
      font-weight: bold;
      line-height: 1.3;
    }

    .card-desc {
      color: #81c784;
      font-size: 0.8rem;
      line-height: 1.4;
    }

    /* ── Game Over UI ──────────────────────────────────────────── */
    #gameOverOverlay h1 {
      color: #e53935;
      font-size: 3rem;
      text-shadow: 0 0 30px #e5393588;
      letter-spacing: 4px;
      margin-bottom: 14px;
    }

    #gameOverStats {
      color: #ccc;
      font-size: 1.1rem;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    #restartBtn {
      padding: 12px 40px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #restartBtn:hover {
      background: #ff5252;
      transform: scale(1.04);
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- Level-up overlay -->
  <div id="levelUpOverlay" class="overlay hidden">
    <h2>LEVEL UP!</h2>
    <p>Choose an upgrade</p>
    <div id="upgradeCards"></div>
  </div>

  <!-- Game over overlay -->
  <div id="gameOverOverlay" class="overlay hidden">
    <h1>YOU DIED</h1>
    <p id="gameOverStats"></p>
    <button id="restartBtn">RESTART</button>
  </div>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
