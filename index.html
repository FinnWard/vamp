<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vamp – Space Survivors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #00000e;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    #gameCanvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    /* ── Overlays ──────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 18, 0.86);
      z-index: 10;
    }

    .overlay.hidden {
      display: none;
    }

    /* ── Title Screen ──────────────────────────────────────────── */
    #titleOverlay {
      gap: 22px;
    }

    #titleOverlay .title-logo {
      font-size: 3.5rem;
      color: #00e5ff;
      text-shadow: 0 0 40px #00e5ffaa, 0 0 80px #00e5ff44;
      letter-spacing: 10px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 40px #00e5ffaa, 0 0 80px #00e5ff44; }
      50%       { text-shadow: 0 0 60px #00e5ffcc, 0 0 120px #00e5ff66; }
    }

    #titleOverlay .title-sub {
      font-size: 0.55rem;
      color: #4dd0e1;
      letter-spacing: 4px;
      margin-bottom: 14px;
    }

    #titleOverlay .title-hint {
      font-size: 0.44rem;
      color: #80cbc4;
      letter-spacing: 2px;
      line-height: 2;
      text-align: center;
    }

    #titleOverlay #highScoreDisplay {
      font-size: 0.5rem;
      color: #ffd740;
      letter-spacing: 2px;
    }

    #playBtn {
      padding: 14px 44px;
      background: #0d1b4b;
      color: #00e5ff;
      border: 2px solid #00e5ff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 3px;
      transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
      margin-top: 8px;
    }

    #playBtn:hover {
      background: #00e5ff;
      color: #000;
      transform: scale(1.06);
      box-shadow: 0 0 20px #00e5ff88;
    }

    /* ── Difficulty Screen ─────────────────────────────────────── */
    #difficultyOverlay {
      gap: 20px;
    }

    #difficultyOverlay h2 {
      color: #00e5ff;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-shadow: 0 0 16px #00e5ff88;
    }

    #difficultyOverlay p {
      color: #4dd0e1;
      font-size: 0.5rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    #diffBtns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .diff-btn {
      width: 150px;
      padding: 16px 10px;
      background: #020818;
      border: 2px solid #0d47a1;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.1s, transform 0.1s, background 0.1s;
    }

    .diff-btn:hover {
      border-color: #00e5ff;
      background: #050f2a;
      transform: translateY(-3px);
      box-shadow: 0 0 14px #00e5ff44;
    }

    .diff-btn .diff-name {
      color: #e0f7fa;
      font-size: 0.65rem;
    }

    .diff-btn .diff-desc {
      color: #4dd0e1;
      font-size: 0.42rem;
      text-align: center;
      line-height: 1.7;
    }

    .diff-btn[data-difficulty="void"] .diff-name { color: #ff4081; }
    .diff-btn[data-difficulty="void"] { border-color: #880e4f; }
    .diff-btn[data-difficulty="void"]:hover { border-color: #ff4081; box-shadow: 0 0 14px #ff408144; }

    /* ── Level-up UI ───────────────────────────────────────────── */
    #levelUpOverlay h2 {
      color: #00e5ff;
      font-size: 1.4rem;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #00e5ff88;
      letter-spacing: 3px;
    }

    #levelUpOverlay p {
      color: #4fc3f7;
      margin-bottom: 28px;
      font-size: 0.6rem;
      letter-spacing: 2px;
    }

    #upgradeCards {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .upgrade-card {
      width: 190px;
      padding: 18px 14px;
      background: #020818;
      border: 2px solid #0d47a1;
      cursor: pointer;
      transition: border-color 0.1s, transform 0.1s, background 0.1s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: center;
      image-rendering: pixelated;
    }

    .upgrade-card:hover {
      border-color: #00e5ff;
      background: #050f2a;
      transform: translateY(-3px);
      box-shadow: 0 0 14px #00e5ff44;
    }

    .card-label {
      color: #e0f7fa;
      font-size: 0.6rem;
      line-height: 1.5;
    }

    .card-desc {
      color: #4dd0e1;
      font-size: 0.5rem;
      line-height: 1.6;
    }

    /* ── Menu (pause) button ───────────────────────────────────── */
    #menuBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 5;
      width: 44px;
      height: 44px;
      background: rgba(2, 8, 32, 0.82);
      border: 2px solid #01579b;
      color: #00e5ff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      touch-action: manipulation;
      transition: background 0.1s, border-color 0.1s;
    }

    #menuBtn:hover, #menuBtn:active {
      background: rgba(0, 229, 255, 0.15);
      border-color: #00e5ff;
    }

    #menuBtn.hidden { display: none; }

    /* ── Mute button ───────────────────────────────────────────── */
    #muteBtn {
      position: fixed;
      top: 10px;
      right: 62px;
      z-index: 5;
      width: 44px;
      height: 44px;
      background: rgba(2, 8, 32, 0.82);
      border: 2px solid #01579b;
      color: #00e5ff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      touch-action: manipulation;
      transition: background 0.1s, border-color 0.1s;
    }

    #muteBtn:hover, #muteBtn:active {
      background: rgba(0, 229, 255, 0.15);
      border-color: #00e5ff;
    }

    /* ── Mobile responsive overlays ───────────────────────────── */
    @media (max-width: 600px) {
      #titleOverlay .title-logo { font-size: 2.2rem; }
      #titleOverlay .title-sub  { font-size: 0.42rem; }
      .diff-btn { width: 120px; padding: 12px 6px; }
      .diff-btn .diff-name { font-size: 0.55rem; }
      .diff-btn .diff-desc { font-size: 0.37rem; }

      #levelUpOverlay h2 { font-size: 0.9rem; }
      #levelUpOverlay p  { font-size: 0.45rem; }
      .upgrade-card      { width: 150px; padding: 12px 10px; }
      .card-label        { font-size: 0.48rem; }
      .card-desc         { font-size: 0.4rem; }

      #pauseOverlay h2   { font-size: 0.85rem; }
      #pauseStats        { font-size: 0.45rem; gap: 16px; flex-wrap: wrap; justify-content: center; }
      #pauseStats .stat-val { font-size: 0.7rem; }
      #pauseWeapons      { max-width: 100%; padding: 0 8px; }
      .pause-weapon-card { width: 145px; padding: 10px 12px; }
      .pause-weapon-name { font-size: 0.45rem; }
      .pause-weapon-level { font-size: 0.4rem; }
      .pause-weapon-stats { font-size: 0.38rem; }
      #resumeBtn         { font-size: 0.55rem; padding: 10px 24px; }
      #restartBtn        { font-size: 0.55rem; padding: 10px 24px; }
      #gameOverOverlay h1 { font-size: 1.2rem; }
      #gameOverStats     { font-size: 0.5rem; }
    }

    /* Make pause overlay scrollable if content overflows on small screens */
    #pauseOverlay {
      overflow-y: auto;
      padding: 20px 12px;
      gap: 24px;
    }

    #pauseOverlay h2 {
      color: #00e5ff;
      font-size: 1.2rem;
      text-shadow: 0 0 16px #00e5ff88;
      letter-spacing: 4px;
    }

    #pauseStats {
      display: flex;
      gap: 28px;
      font-size: 0.55rem;
      color: #4dd0e1;
      letter-spacing: 2px;
    }

    #pauseStats span {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #pauseStats .stat-val {
      color: #e0f7fa;
      font-size: 0.85rem;
    }

    #pauseWeapons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 760px;
    }

    .pause-weapon-card {
      width: 210px;
      padding: 14px 16px;
      background: #020818;
      border: 2px solid #0d47a1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pause-weapon-card.evolution { border-color: #6200ea; }

    .pause-weapon-name {
      color: #00e5ff;
      font-size: 0.55rem;
      letter-spacing: 1px;
    }

    .pause-weapon-card.evolution .pause-weapon-name { color: #ea80fc; }

    .pause-weapon-level { color: #ffd740; font-size: 0.5rem; }

    .pause-weapon-stats {
      color: #80cbc4;
      font-size: 0.45rem;
      line-height: 1.8;
    }

    #resumeBtn {
      padding: 12px 36px;
      background: #0d1b4b;
      color: #00e5ff;
      border: 2px solid #00e5ff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.1s, transform 0.1s;
    }

    #resumeBtn:hover {
      background: #00e5ff;
      color: #000;
      transform: scale(1.04);
    }

    /* ── Game Over UI ──────────────────────────────────────────── */
    #gameOverOverlay {
      gap: 16px;
      overflow-y: auto;
      padding: 20px 12px;
    }

    #gameOverOverlay h1 {
      color: #ff1744;
      font-size: 1.8rem;
      text-shadow: 0 0 30px #ff174488;
      letter-spacing: 4px;
      margin-bottom: 8px;
      line-height: 1.4;
      text-align: center;
    }

    #gameOverStats {
      color: #90caf9;
      font-size: 0.55rem;
      letter-spacing: 1px;
      text-align: center;
      line-height: 2.2;
      max-width: 560px;
    }

    .stats-line { color: #90caf9; }
    .stats-line b { color: #e0f7fa; }

    .stats-weapons {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 420px;
      width: 100%;
    }

    .stats-weapon-row {
      display: flex;
      justify-content: space-between;
      color: #80cbc4;
      font-size: 0.48rem;
      padding: 4px 8px;
      border: 1px solid #0d47a1;
      background: #020818;
    }

    .stats-weapon-row span:last-child { color: #ffd740; }

    #restartBtn {
      padding: 14px 36px;
      background: #0d1b4b;
      color: #00e5ff;
      border: 2px solid #00e5ff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
      margin-top: 8px;
    }

    #restartBtn:hover {
      background: #00e5ff;
      color: #000;
      transform: scale(1.04);
      box-shadow: 0 0 16px #00e5ff88;
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- Pause menu button (visible during gameplay) -->
  <button id="menuBtn" title="Pause (P)" class="hidden">⏸</button>

  <!-- Mute / unmute button -->
  <button id="muteBtn" title="Toggle sound">🔊</button>

  <!-- Title screen -->
  <div id="titleOverlay" class="overlay">
    <div class="title-logo">VAMP</div>
    <div class="title-sub">SPACE SURVIVORS</div>
    <div id="highScoreDisplay" class="title-hint">Best: 0 kills</div>
    <div class="title-hint">
      WASD / Arrow keys to move<br>
      Survive as long as possible
    </div>
    <button id="playBtn">▶ PLAY</button>
  </div>

  <!-- Difficulty selector -->
  <div id="difficultyOverlay" class="overlay hidden">
    <h2>SELECT DIFFICULTY</h2>
    <p>Choose your challenge</p>
    <div id="diffBtns">
      <button class="diff-btn" data-difficulty="easy">
        <span class="diff-name">EASY</span>
        <span class="diff-desc">0.75× HP &amp; DMG<br>0.8× spawn rate</span>
      </button>
      <button class="diff-btn" data-difficulty="normal">
        <span class="diff-name">NORMAL</span>
        <span class="diff-desc">Standard<br>experience</span>
      </button>
      <button class="diff-btn" data-difficulty="hard">
        <span class="diff-name">HARD</span>
        <span class="diff-desc">1.4× HP<br>1.3× DMG</span>
      </button>
      <button class="diff-btn" data-difficulty="void">
        <span class="diff-name">VOID</span>
        <span class="diff-desc">2× HP<br>1.75× DMG<br>1.5× spawn</span>
      </button>
    </div>
  </div>

  <!-- Pause overlay -->
  <div id="pauseOverlay" class="overlay hidden">
    <h2 id="pauseTitle">⏸ PAUSED</h2>
    <div id="pauseStats"></div>
    <div id="pauseWeapons"></div>
    <button id="resumeBtn">RESUME</button>
  </div>

  <!-- Level-up overlay -->
  <div id="levelUpOverlay" class="overlay hidden">
    <h2>★ RANK UP! ★</h2>
    <p>CHOOSE UPGRADE</p>
    <div id="upgradeCards"></div>
  </div>

  <!-- Game over overlay -->
  <div id="gameOverOverlay" class="overlay hidden">
    <h1>HULL BREACH</h1>
    <div id="gameOverStats"></div>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
